org.gradle.jvmargs=-Xmx4g
kotlin.code.style=official
# Declaring all four native desktop targets is fine on any host — only the
# host-buildable ones can actually link (Apple targets need macOS, etc.).
kotlin.native.ignoreDisabledTargets=true
android.useAndroidX=true
# AGP 9 moved single-module KMP apps to the split com.android.kotlin
# .multiplatform.library layout; these flags keep the classic
# com.android.application + androidTarget() combo working in ONE module.
android.builtInKotlin=false
android.newDsl=false
org.jetbrains.compose.experimental.macos.enabled=true