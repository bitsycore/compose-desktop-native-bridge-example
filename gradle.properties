# Android
android.useAndroidX=true

# Gradle
org.gradle.jvmargs=-Xmx4096M
org.gradle.configuration-cache=true
org.gradle.caching=true
org.gradle.parallel=true
org.gradle.tooling.parallel=true

# Kotlin
kotlin.code.style=official
kotlin.incremental=true

kotlin.mpp.enableCInteropCommonization=true
kotlin.incremental.native=true
kotlin.native.ignoreDisabledTargets=true
kotlin.native.enableKlibsCrossCompilation=false

# Compose
org.jetbrains.compose.experimental.macos.enabled=true

# Versions
agpVersion=9.3.0
kotlinVersion=2.4.10

# Compose Desktop Native bridge plugin. It exposes the exact Compose versions the
# port tracks (see shared/build.gradle.kts via composeDesktopNative.*), so the
# artifact versions no longer need to be pinned here. Override the substituted
# port klib version with -PcomposeDesktopNative.version=… if mixing releases.
bridgeVersion=0.2.1

# Compose Multiplatform Gradle plugin version (settings.gradle.kts). The CMP
# artifact versions come from the bridge extension, not this property.
composeMultiplatformVersion=1.12.0-beta02